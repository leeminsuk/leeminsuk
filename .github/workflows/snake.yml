name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        # Patched fork: splits the contribution query to stay under GitHub GraphQL
        # resource limits (upstream query gets RESOURCE_LIMITS_EXCEEDED for this account)
        uses: leeminsuk/snk/svg-only@b4c3ce41b07440333c198d4d8535a35de19a565a
        with:
          github_user_name: leeminsuk
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
