name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        # Patched fork: splits the GraphQL query to stay under GitHub resource limits
        # (upstream query gets RESOURCE_LIMITS_EXCEEDED for this account)
        uses: leeminsuk/github-profile-3d-contrib@4a7841070401dc87f499418a7e9eb6378fb58613
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: leeminsuk

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git commit -m "Generate 3D contribution graph" || echo "No changes to commit"
          git push
